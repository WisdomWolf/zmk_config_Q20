on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    name: Build BBQ20 Firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Debug config path
        run: |
          echo "PWD: $PWD"
          echo "Workspace: ${{ github.workspace }}"
          ls -la config/
          cat config/bbq20.keymap
          echo "workspace keymap:"
          cat ${{ github.workspace }}/config/bbq20.keymap

      - name: Debug config path
        run: |
          find zmk -name "*.keymap" 2>/dev/null
          find zmk -name "bbq20*" 2>/dev/null

      - name: Build BBQ20 Firmware
        run: |
          west build -s zmk/app -b bbq20 -- \
            -DZMK_CONFIG=${{ github.workspace }}/config

      - name: Archive Firmware
        uses: actions/upload-artifact@v4
        with:
          name: bbq20-zmk
          path: build/zephyr/zmk.uf2